name: Compile Paper

on:
  push:
    paths:
      - 'paper/**'
      - 'Bibliography_base.bib'
  pull_request:
    paths:
      - 'paper/**'
      - 'Bibliography_base.bib'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for main.tex
        id: check
        run: |
          if [ -f paper/main.tex ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::paper/main.tex not found — skipping compilation (template repo)"
          fi

      - name: Compile main paper
        if: steps.check.outputs.exists == 'true'
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: paper
          latexmk_use_xelatex: true

      - name: Upload PDF
        if: steps.check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/main.pdf
